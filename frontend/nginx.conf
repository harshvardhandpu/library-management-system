server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy ──────────────────────────────────────────
    # Forward /api/* requests to the Spring Boot backend.
    # The backend service is resolved via Docker Compose networking.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long-running requests (e.g., bulk operations)
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── SPA ────────────────────────────────────────────────
    # Serve static assets directly, fall back to index.html
    # for client-side routing (React Router).
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|svg|webp)$ {
            expires 6M;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Security Headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
